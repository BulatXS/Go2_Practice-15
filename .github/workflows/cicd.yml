name: Build and Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: auth
            dockerfile: services/auth/Dockerfile
            image: pr15-auth
          - service: tasks
            dockerfile: services/tasks/Dockerfile
            image: pr15-tasks
          - service: worker
            dockerfile: services/worker/Dockerfile
            image: pr15-worker
          - service: graphql
            dockerfile: services/graphql/Dockerfile
            image: pr15-graphql

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy on VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,IMAGE_TAG
          script: |
            set -e
            cd /opt/pr15/deploy

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            export DOCKERHUB_USERNAME
            export IMAGE_TAG

            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
              IS_V1=0
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
              IS_V1=1
            else
              echo "No docker compose command found on VPS" >&2
              exit 1
            fi

            $COMPOSE -f docker-compose.prod.yml pull
            if [ "$IS_V1" -eq 1 ]; then
              $COMPOSE -f docker-compose.prod.yml down --remove-orphans
            fi
            $COMPOSE -f docker-compose.prod.yml up -d --remove-orphans

            docker logout || true
